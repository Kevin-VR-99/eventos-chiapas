<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventos Chiapas</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Eventos Chiapas</h1>
    <p>Descubre los mejores eventos de la región</p>
  </header>

  <main>
    <div class="form-card">
      <div class="form-header">
        <h2>Registro al evento</h2>
      </div>
      <form onsubmit="return validarFormulario()">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre">

        <label for="correo">Correo:</label>
        <input type="email" id="correo" name="correo" placeholder="Ingresa tu correo">

        <button type="submit" class="btn">Registrarme</button>
      </form>
    </div>
  </main>

  <footer>
    <p>© 2026 Eventos Chiapas</p>
  </footer>

  <script src="js/script.js" defer></script>
</body>
</html>
